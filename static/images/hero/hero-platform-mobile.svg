  <rect x="265" y="34" width="3" height="6" rx="0.5" fill="#111"/>
  <rect x="270" y="32" width="3" height="8" rx="0.5" fill="#111"/>
  <rect x="275" y="30" width="3" height="10" rx="0.5" fill="#111"/>
