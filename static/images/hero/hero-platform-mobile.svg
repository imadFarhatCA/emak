<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 690" fill="none">

  <!-- ═══ Phone Frame ═══ -->
  <rect x="20" y="15" width="300" height="660" rx="36" fill="#1a1a1a"/>
  <!-- Screen -->
  <rect x="24" y="19" width="292" height="652" rx="34" fill="#f7f6f5"/>
