  <text x="137" y="168" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#111">156</text>
  <rect x="180" y="158" width="24" height="12" rx="6" fill="#e6f9ee"/>
  <text x="192" y="167" font-family="Inter,sans-serif" font-size="7" font-weight="600" fill="#34c759" text-anchor="middle">94%</text>

