  <text x="272" y="218" font-family="Inter,sans-serif" font-size="8" fill="#ee7700">View all</text>

  <!-- Call 1 -->
  <circle cx="56" cy="244" r="12" fill="#fef3c7"/>
  <text x="56" y="248" font-family="Inter,sans-serif" font-size="7" font-weight="600" fill="#92400e" text-anchor="middle">JD</text>
  <text x="74" y="240" font-family="Inter,sans-serif" font-size="10" font-weight="500" fill="#111">John D.</text>
  <text x="74" y="252" font-family="Inter,sans-serif" font-size="8" fill="#34c759">Answered · 4m ago</text>
