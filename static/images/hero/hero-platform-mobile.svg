  <!-- ═══ Stat Cards ═══ -->
  <rect x="34" y="128" width="86" height="58" rx="8" fill="#fff"/>
  <text x="44" y="144" font-family="Inter,sans-serif" font-size="7" fill="#999">Active Lines</text>
  <text x="44" y="168" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#111">24</text>
