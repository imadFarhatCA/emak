  <path d="M288,38 Q292,30 296,38" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M290,36 Q292,32 294,36" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Battery -->
  <rect x="302" y="33" width="16" height="8" rx="2" stroke="#111" stroke-width="1" fill="none"/>
  <rect x="318" y="35.5" width="2" height="3" rx="0.5" fill="#111"/>
